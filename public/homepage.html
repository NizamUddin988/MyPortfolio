<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="browser.png">
    <title>House Rental Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 32px;
            color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .add-property-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-property-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7fafc;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
        }

        .location-info i {
            color: #667eea;
            font-size: 20px;
        }

        .location-info span {
            font-weight: 600;
            color: #4a5568;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #e2e8f0;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .main-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 500px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }

        .page-title h2 {
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: #718096;
            font-size: 16px;
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .card-state {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .card-state h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .card-state .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
        }

        .card-city {
            padding: 20px;
        }

        .card-city h4 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .availability {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .availability.high { background: #d4edda; color: #155724; }
        .availability.medium { background: #fff3cd; color: #856404; }
        .availability.low { background: #f8d7da; color: #721c24; }

        .city-stats {
            display: flex;
            justify-content: space-between;
            color: #718096;
            font-size: 14px;
        }

        .house-card {
            padding: 0;
        }

        .house-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .house-info {
            padding: 20px;
        }

        .house-price {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .house-specs {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .house-specs span {
            background: #f7fafc;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        .house-address {
            color: #718096;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 5px;
        }

        .house-address i {
            color: #667eea;
            margin-top: 2px;
        }

        .house-owner {

            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }

            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

            font-size: 14px;
            margin: 0;
            color: #2d3748;
        }

        .owner-info p {
            font-size: 12px;
            color: #718096;
            margin: 0;
        }

        .contact-buttons {
            display: flex;
            gap: 10px;
        }

        .contact-btn {

            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .back-btn:hover {
            background: #edf2f7;
            transform: translateX(-5px);
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #718096;
        }

        .empty-state i {
            font-size: 64px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #4a5568;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #718096;
            font-size: 14px;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: #764ba2;
        }

        .breadcrumb i {
            font-size: 12px;
        }
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-tag {
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #4a5568;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-tag.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .form-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn {
            background: #e2e8f0;
            color: #4a5568;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .cards-container {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
            }
            
            .contact-buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            header, .main-content {
                padding: 15px;
                border-radius: 15px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
            
            .page-title h2 {
                font-size: 24px;
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="logo">
                    <i class="fas fa-home"></i>
                    <h1>House Rental Explorer</h1>
                </div>
                <div class="header-actions">
                    <button class="add-property-btn" onclick="openAddPropertyModal()">
                        <i class="fas fa-plus"></i> Add Property
                    </button>
                    <div class="location-info">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>India</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" 
                           id="citySearch" 
                           class="search-input" 
                           placeholder="Search for city, state, or house type...">
                    <button onclick="searchCity()" class="search-btn">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </header>
        
        <div class="main-content" id="mainContent">
           
        </div>
    </div>


    <div class="modal" id="addPropertyModal">
        <div class="modal-content">
            <h3><i class="fas fa-home"></i> Add New Property</h3>
            <form id="propertyForm" onsubmit="addNewProperty(event)">
                <div class="form-group">
                    <label for="propertyType">Property Type</label>
                    <select id="propertyType" required>
                        <option value="">Select Type</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Bungalow">Bungalow</option>
                        <option value="Cottage">Cottage</option>
                        <option value="Villa">Villa</option>
                        <option value="Studio">Studio</option>
                        <option value="Penthouse">Penthouse</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" placeholder="Enter State" required>
                </div>
                
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter City" required>
                </div>
                
                <div class="form-group">
                    <label for="address">Full Address</label>
                    <textarea id="address" rows="3" placeholder="Enter complete address" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="rent">Monthly Rent (₹)</label>
                    <input type="number" id="rent" placeholder="e.g., 25000" required>
                </div>
                
                <div class="form-group">
                    <label for="bhk">BHK Configuration</label>
                    <select id="bhk" required>
                        <option value="">Select</option>
                        <option value="1 BHK">1 BHK</option>
                        <option value="2 BHK">2 BHK</option>
                        <option value="3 BHK">3 BHK</option>
                        <option value="4 BHK">4 BHK</option>
                        <option value="5+ BHK">5+ BHK</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="area">Carpet Area (sq ft)</label>
                    <input type="number" id="area" placeholder="e.g., 950" required>
                </div>
                
                <div class="form-group">
                    <label for="ownerName">Owner Name</label>
                    <input type="text" id="ownerName" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="ownerPhone">Contact Number</label>
                    <input type="tel" id="ownerPhone" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label for="ownerEmail">Email Address</label>
                    <input type="email" id="ownerEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="imageUrl">Property Image URL</label>
                    <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" required>
                </div>
                
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeAddPropertyModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Add Property</button>
                </div>
            </form>
        </div>
    </div>

        let navigationHistory = [];
        let currentHouseType = null;
        let currentState = null;
        let currentCity = null;
        document.addEventListener('DOMContentLoaded', () => {
            const selectedHouse = localStorage.getItem("selectedHouse");
            console.log(selectedHouse)
            
            if (selectedHouse && housesData[selectedHouse]) {
                currentHouseType = selectedHouse;
                showStatesForHouse(selectedHouse);
            } else {
                showWelcomePage();
            }
        });

        function showWelcomePage() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="page-title">
                    <h2>Find Your Perfect Home</h2>
                    <p>Discover houses across India with our comprehensive rental explorer</p>
                </div>
                
                <div class="empty-state">
                    <i class="fas fa-home"></i>
                    <h3>Browse Available Properties</h3>
                    <p>Select a house type or use search to find your dream rental home</p>
                    <button class="back-btn" onclick="showStatesForHouse('Apartment')">
                        <i class="fas fa-building"></i> Start Browsing
                    </button>
                </div>
            `;
        }
        function showStatesForHouse(houseType) {
            currentHouseType = houseType;
            const houseData = housesData[houseType];
            const content = document.getElementById('mainContent');
            
            let html = `
                <div class="page-title">
                    <h2>${houseType} Rentals</h2>
                    <p>Browse available states for ${houseType.toLowerCase()} rentals</p>
                </div>
                
                <div class="filter-tags">
                    <div class="filter-tag active">
                        <i class="fas fa-building"></i> ${houseType}
                    </div>
                    <div class="filter-tag">
                        <i class="fas fa-map"></i> ${Object.keys(houseData.states).length} States
                    </div>
                    <div class="filter-tag">
                        <i class="fas fa-home"></i> ${getTotalProperties(houseType)} Properties
                    </div>
                </div>
                
                <div class="cards-container">
            `;
            
            for (const [stateName, stateData] of Object.entries(houseData.states)) {
                const totalCities = Object.keys(stateData.cities).length;
                const totalHouses = Object.values(stateData.cities).reduce((sum, city) => sum + city.count, 0);
                
                html += `
                    <div class="card" onclick="showCitiesForState('${houseType}', '${stateName}')">
                        <div class="card-state">
                            <h3>${stateName}</h3>
                            <div class="count">${totalCities} Cities</div>
                        </div>
                        <div class="card-city">
                            <div class="city-stats">
                                <span><i class="fas fa-home"></i> ${totalHouses} Properties</span>
                                <span><i class="fas fa-city"></i> ${totalCities} Cities</span>
                            </div>
                            <p style="color: #718096; font-size: 14px; margin-top: 10px;">
                                Click to view available cities
                            </p>
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            content.innerHTML = html;
            addToHistory({type: 'states', houseType});
        }

        function showCitiesForState(houseType, stateName) {
            currentState = stateName;
            const stateData = housesData[houseType].states[stateName];
            const content = document.getElementById('mainContent');
            
            let html = `
                <div class="breadcrumb">
                    <a href="javascript:void(0)" onclick="showStatesForHouse('${houseType}')">
                        <i class="fas fa-chevron-left"></i> Back to States
                    </a>
                    <i class="fas fa-chevron-right"></i>
                    <span>${stateName}</span>
                </div>
                
                <div class="page-title">
                    <h2>${houseType} in ${stateName}</h2>
                    <p>Available cities with rental properties</p>
                </div>
                
                <div class="filter-tags">
                    <div class="filter-tag">
                        <i class="fas fa-building"></i> ${houseType}
                    </div>
                    <div class="filter-tag active">
                        <i class="fas fa-map-marker-alt"></i> ${stateName}
                    </div>
                </div>
                
                <div class="cards-container">
            `;
            
            for (const [cityName, cityData] of Object.entries(stateData.cities)) {
                html += `
                    <div class="card" onclick="showHousesInCity('${houseType}', '${stateName}', '${cityName}')">
                        <div class="card-city">
                            <h4>${cityName}</h4>
                            <div class="availability ${cityData.availability}">
                                ${cityData.availability.toUpperCase()} AVAILABILITY
                            </div>
                            <div class="city-stats">
                                <span><i class="fas fa-home"></i> ${cityData.count} Properties</span>
                                <span><i class="fas fa-tag"></i> ${getPriceRange(cityData.houses)}</span>
                            </div>
                            <p style="color: #718096; font-size: 14px; margin-top: 10px;">
                                Click to view ${cityData.count} available properties
                            </p>
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            content.innerHTML = html;
            addToHistory({type: 'cities', houseType, stateName});
        }

        function showHousesInCity(houseType, stateName, cityName) {
            currentCity = cityName;
            const cityData = housesData[houseType].states[stateName].cities[cityName];
            const content = document.getElementById('mainContent');
            
            let html = `
                <div class="breadcrumb">
                    <a href="javascript:void(0)" onclick="showStatesForHouse('${houseType}')">
                        <i class="fas fa-chevron-left"></i> States
                    </a>
                    <i class="fas fa-chevron-right"></i>
                    <a href="javascript:void(0)" onclick="showCitiesForState('${houseType}', '${stateName}')">
                        ${stateName}
                    </a>
                    <i class="fas fa-chevron-right"></i>
                    <span>${cityName}</span>
                </div>
                
                <div class="page-title">
                    <h2>${houseType} in ${cityName}, ${stateName}</h2>
                    <p>${cityData.count} properties available • ${cityData.availability} availability</p>
                </div>
                
                <div class="filter-tags">
                    <div class="filter-tag">
                        <i class="fas fa-building"></i> ${houseType}
                    </div>
                    <div class="filter-tag">
                        <i class="fas fa-map-marker-alt"></i> ${stateName}
                    </div>
                    <div class="filter-tag active">
                        <i class="fas fa-city"></i> ${cityName}
                    </div>
                </div>
                
                <div class="cards-container">
            `;
            
            cityData.houses.forEach((house, index) => {
                html += `
                    <div class="card house-card">
                        <img src="${house.image}" alt="${houseType}" class="house-image">
                        <div class="house-info">
                            <div class="house-price">${house.rent}</div>
                            <div class="house-specs">
                                <span>${house.bhk}</span>
                                <span>${house.area}</span>
                                ${house.owner.verified ? '<span style="background:#d4edda; color:#155724;"><i class="fas fa-check-circle"></i> Verified</span>' : ''}
                            </div>
                            <div class="house-address">
                                <i class="fas fa-map-marker-alt"></i> ${house.address}
                            </div>
                            
                            <div class="house-owner">
                                <img src="${house.owner.avatar}" alt="Owner" class="owner-avatar">
                                <div class="owner-info">
                                    <h4>${house.owner.name}</h4>
                                    <p>Property Owner</p>
                                </div>
                            </div>
                            
                            <div class="contact-buttons">
                                <button onclick="contactOwner('${houseType}', '${cityName}', '${house.rent}', '${house.owner.name}', '${house.owner.phone}', '${house.owner.email}', ${index})" 
                                        class="contact-btn">
                                    <i class="fas fa-phone-alt"></i> Call Owner
                                </button>
                                <button onclick="whatsappOwner('${house.owner.name}', '${house.owner.phone}', '${house.rent}', '${cityName}')" 
                                        class="contact-btn whatsapp-btn">
                                    <i class="fab fa-whatsapp"></i> WhatsApp
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            content.innerHTML = html;
            addToHistory({type: 'houses', houseType, stateName, cityName});
        }
        function getTotalProperties(houseType) {
            let total = 0;
            const houseData = housesData[houseType];
            for (const state of Object.values(houseData.states)) {
                for (const city of Object.values(state.cities)) {
                    total += city.count;
                }
            }
            return total;
        }
        function getPriceRange(houses) {
            if (houses.length === 0) return 'No prices';
            const prices = houses.map(h => parseInt(h.rent.replace(/[^0-9]/g, '')));
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            return min === max ? `₹${min}/month` : `₹${min} - ₹${max}/month`;
        }

        function searchCity() {
            const searchTerm = document.getElementById('citySearch').value.toLowerCase().trim();
            if (!searchTerm) return;
            
            let found = false;
    
            for (const [houseType, houseData] of Object.entries(housesData)) {
                for (const [stateName, stateData] of Object.entries(houseData.states)) {
                    for (const [cityName, cityData] of Object.entries(stateData.cities)) {
                        if (cityName.toLowerCase().includes(searchTerm) || 
                            stateName.toLowerCase().includes(searchTerm) ||
                            houseType.toLowerCase().includes(searchTerm)) {
                            
                            if (houseType.toLowerCase().includes(searchTerm)) {
                                showStatesForHouse(houseType);
                            } else {
                                showHousesInCity(houseType, stateName, cityName);
                            }
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                }
                if (found) break;
            }
            
            if (!found) {
                const content = document.getElementById('mainContent');
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No Results Found</h3>
                        <p>We couldn't find any properties matching "${searchTerm}"</p>
                        <button class="back-btn" onclick="showStatesForHouse('${currentHouseType || 'Apartment'}')">
                            <i class="fas fa-arrow-left"></i> Back to Browse
                        </button>
                    </div>
                `;
            }
        }

        function addToHistory(navData) {
            navigationHistory.push(navData);
        }

        document.getElementById('citySearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCity();
            }
        });
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('addPropertyModal');
            if (event.target === modal) {

        });

                const firstHouseType = Object.keys(housesData)[0];
                currentHouseType = firstHouseType;
                showStatesForHouse(firstHouseType);
            }
        }, 100);
