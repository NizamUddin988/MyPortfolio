<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:     #6B3FA0;
      --purple-light: #9B6FD0;
      --purple-dim: rgba(107,63,160,0.15);
      --bg:         #0e0c14;
      --bg2:        #16121f;
      --text:       #e8e4f0;
      --muted:      #7a7388;
      --border:     rgba(155,111,208,0.2);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* purple glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,63,160,0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
    }

    /* terminal tag */
    .tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--purple-light);
      background: var(--purple-dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      margin-bottom: 2rem;
    }

    /* 404 glitch number */
    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(96px, 20vw, 148px);
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      position: relative;
      display: inline-block;
      margin-bottom: 0.5rem;
      user-select: none;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }

    .error-code::before {
      color: #9B6FD0;
      animation: glitch-1 3.5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    .error-code::after {
      color: #4fd1c5;
      animation: glitch-2 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch-1 {
      0%,90%,100%   { transform: translate(0); opacity: 0; }
      91%           { transform: translate(-4px, 1px); opacity: 0.9; }
      93%           { transform: translate(4px, -1px); opacity: 0.9; }
      95%           { transform: translate(-2px, 0); opacity: 0.9; }
      97%           { transform: translate(0); opacity: 0; }
    }

    @keyframes glitch-2 {
      0%,90%,100%   { transform: translate(0); opacity: 0; }
      92%           { transform: translate(4px, 2px); opacity: 0.8; }
      94%           { transform: translate(-4px, -2px); opacity: 0.8; }
      96%           { transform: translate(2px, 1px); opacity: 0.8; }
      98%           { transform: translate(0); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-code::before,
      .error-code::after { animation: none; opacity: 0; }
    }

    /* divider bar */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--purple);
      margin: 1.25rem auto;
      border-radius: 2px;
    }

    .headline {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 0.75rem;
    }

    .subtext {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.25rem;
    }

    /* terminal path box */
    .path-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      margin-bottom: 2.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      max-width: 100%;
    }

    .path-box .prompt { color: var(--purple-light); }
    .path-box .path   { color: #e879a0; word-break: break-all; }

    /* cursor blink */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background: var(--purple-light);
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

    /* buttons */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--purple-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(107,63,160,0.35);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: rgba(155,111,208,0.5);
      transform: translateY(-1px);
    }

    /* footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      z-index: 1;
    }

    .footer span { color: var(--purple-light); }

    /* scan line flicker */
    @keyframes scanline {
      0%   { top: -10%; }
      100% { top: 110%; }
    }

    .scanline {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: rgba(155,111,208,0.06);
      animation: scanline 6s linear infinite;
      pointer-events: none;
      z-index: 2;
    }
    @media (prefers-reduced-motion: reduce) { .scanline { display: none; } }
  </style>
</head>
<body>

  <div class="scanline"></div>

  <div class="container">
    <div class="tag">ERROR · HTTP STATUS 404</div>

    <div class="error-code">404</div>

    <div class="divider"></div>

    <h1 class="headline">Page not found</h1>
    <p class="subtext">
      The page you're looking for has been moved, deleted,<br>
      or never existed in the first place.
    </p>

    <div class="path-box">
      <span class="prompt">$</span>
      <span class="cursor"></span>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        ← Back to home
      </a>
      <a href="javascript:history.back()" class="btn btn-ghost">
        Go back
      </a>
    </div>
  </div>

  <div class="footer">
    houserental &nbsp;·&nbsp; <span>status 404</span> &nbsp;·&nbsp; page not found
  </div>

  <script>
    // show the actual path that was not found
    const p = window.location.pathname;
    if (p && p !== '/404.html') {
      document.getElementById('path-display').textContent = p;
    }
  </script>
</body>
</html>
