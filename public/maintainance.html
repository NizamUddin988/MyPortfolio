<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .emoji {
      font-size: 52px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #6B3FA0;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #9B6FD0;
    }

    .footer {
      margin-top: 2rem;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔧</div>
    <h1>We're under maintenance</h1>
    <p>
      The House Rental Platform is currently undergoing server migration.
      We'll be back up shortly. Thank you for your patience!
    </p>

    <div class="buttons">
      <a href="index.html" target="_blank" class="btn">
        Preview
      </a>

      <a href="https://github.com/NizamUddin988/House-Rental-Platform" target="_blank" class="btn">
        View Source on GitHub
      </a>
    </div>

    <div class="footer">— Nizam Uddin</div>
  </div>
</body>
</html>
